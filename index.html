<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Index of /ZenithOS/</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0d0d0d;
        --bg2: #141414;
        --bg3: #1f1f1f;
        --panel: #101010;
        --text: #e0e0e0;
        --muted: #888;
        --link: #8ab4f8;
        --border: #222;
        --danger: #ff9b9b;
        --accent: #6fb1ff;
    }

    * {
        box-sizing: border-box;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'JetBrains Mono', monospace;
        margin: 40px;
    }

    h1 {
        font-size: 20px;
        margin: 0 0 10px 0;
        font-weight: normal;
    }

    .sub {
        color: var(--muted);
        margin-bottom: 20px;
        font-size: 13px;
    }

    .bar {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
        flex-wrap: wrap;
    }

    .crumbs a,
    .back {
        color: var(--link);
        text-decoration: none;
        cursor: pointer;
    }

    .crumbs span {
        color: var(--muted);
    }

    .hint {
        color: var(--muted);
        font-size: 12px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 6px 10px;
        border-bottom: 1px solid transparent;
    }

    tr:nth-child(even) {
        background: var(--bg2);
    }

    tr:hover {
        background: var(--bg3);
        cursor: pointer;
    }

    .name {
        color: var(--link);
        width: 70%;
        word-break: break-word;
    }

    .date {
        text-align: right;
        color: var(--muted);
        white-space: nowrap;
    }

    a {
        text-decoration: none;
        color: inherit;
        display: block;
    }

    .panel {
        display: none;
    }

    .panel.active {
        display: block;
    }

    .loading,
    .error {
        color: var(--muted);
        padding: 8px 0;
        font-size: 13px;
    }

    .error {
        color: var(--danger);
    }

    .file-meta {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin: 10px 0 16px 0;
        color: var(--muted);
        font-size: 13px;
    }

    pre {
        margin: 0;
        padding: 16px;
        background: #080808;
        border: 1px solid var(--border);
        overflow: auto;
        line-height: 1.45;
        font-size: 13px;
        white-space: pre;
    }

    .path {
        color: var(--link);
        word-break: break-all;
    }

    .small {
        font-size: 12px;
        color: var(--muted);
    }

    .notfound-wrap {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
    }

    .notfound-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .notfound-code {
        font-size: clamp(90px, 18vw, 180px);
        line-height: 1;
        font-weight: 700;
        color: #ff4d4d;
        letter-spacing: 2px;
        text-shadow: 0 0 18px rgba(255, 77, 77, 0.14);
    }

    .notfound-text {
        font-size: 14px;
        color: var(--muted);
    }

    .commit-strip {
        margin: 8px 0 16px 0;
        padding: 12px 14px;
        background: #0a0a0a;
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 10px;
        display: none;
    }

    .commit-strip.active {
        display: block;
    }

    .commit-strip .label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
    }

    .commit-strip .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        align-items: center;
        font-size: 13px;
        color: var(--text);
    }

    .commit-strip .piece {
        color: var(--muted);
    }

    .commit-strip .sha {
        color: var(--link);
        word-break: break-all;
    }

    .menu-btn {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 42px;
        height: 42px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #101010;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 1000;
        box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .menu-btn.active {
        display: flex;
    }

    .menu-icon {
        width: 18px;
        height: 12px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .menu-icon span {
        display: block;
        height: 2px;
        width: 100%;
        background: var(--text);
        border-radius: 2px;
    }

    .menu-panel {
        position: fixed;
        top: 66px;
        right: 16px;
        width: 260px;
        background: #0f0f0f;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px;
        z-index: 1000;
        display: none;
        box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }

    .menu-panel.open {
        display: block;
    }

    .menu-item {
        width: 100%;
        background: transparent;
        color: var(--text);
        border: 0;
        text-align: left;
        padding: 11px 12px;
        border-radius: 10px;
        cursor: pointer;
        font: inherit;
    }

    .menu-item:hover {
        background: var(--bg2);
    }

    .menu-item.active {
        color: var(--link);
    }

    .menu-subtitle {
        color: var(--muted);
        font-size: 11px;
        padding: 2px 12px 8px 12px;
    }

    .submenu {
        margin: 4px 0 8px 0;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #0b0b0b;
        display: none;
    }

    .submenu.open {
        display: block;
    }

    .submenu button {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
        padding: 9px 10px;
        border-radius: 8px;
        cursor: pointer;
        font: inherit;
    }

    .submenu button:hover {
        background: var(--bg2);
    }

    .submenu button.active {
        color: var(--link);
    }

    .code-view {
        white-space: pre;
    }

    .tok-comment {
        color: #6a9955;
    }

    .tok-string {
        color: #ce9178;
    }

    .tok-number {
        color: #b5cea8;
    }

    .tok-keyword {
        color: #569cd6;
    }

    .tok-type {
        color: #4ec9b0;
    }

    .tok-attr {
        color: #9cdcfe;
    }

    .tok-tag {
        color: #c586c0;
    }

    .tok-punct {
        color: #d4d4d4;
    }

    .tok-plain {
        color: inherit;
    }
</style>
</head>
<body>

<div id="menuButton" class="menu-btn" title="Options" aria-label="Options">
    <div class="menu-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<div id="menuPanel" class="menu-panel" aria-hidden="true">
    <button id="menuSortToggle" class="menu-item">Sort by…</button>
    <div class="menu-subtitle">Size / Name / Date</div>
    <div id="sortSubmenu" class="submenu">
        <button data-sort="name">Name</button>
        <button data-sort="size">Size</button>
        <button data-sort="date">Date</button>
    </div>

    <button id="menuDownload" class="menu-item">Download this repo…</button>
</div>

<div id="rootView" class="panel active">
    <h1 id="rootTitle">Index of /ZenithOS/</h1>
    <div class="sub" id="rootSub">Loading repos…</div>
    <div id="rootCommitStrip" class="commit-strip"></div>
    <table id="repoTable"></table>
</div>

<div id="repoView" class="panel">
    <h1 id="repoTitle">Index of /ZenithOS/</h1>
    <div class="bar">
        <div class="crumbs" id="repoCrumbs"></div>
        <div class="hint" id="repoHint"></div>
    </div>
    <table id="contentTable"></table>
</div>

<div id="fileView" class="panel">
    <h1 id="fileTitle">Index of file</h1>
    <div class="bar">
        <div class="crumbs">
            <a class="back" id="fileBack">← back</a>
        </div>
        <div class="hint" id="fileHint"></div>
    </div>
    <div class="file-meta" id="fileMeta"></div>
    <pre id="fileContent" class="code-view">Loading…</pre>
</div>

<div id="notFoundView" class="panel">
    <div class="notfound-wrap">
        <div class="notfound-box">
            <div class="notfound-code">404</div>
            <div class="notfound-text" id="notFoundText">Repo not found! Try again..</div>
        </div>
    </div>
</div>

<script>
const OWNER = "pigeonbattlehost";

const allowedPrefixes = [
    "abi","art","bionic","bootable","build","cts","dalvik",
    "developers","development","device","docs","external",
    "frameworks","hardware","libcore","libnativehelper",
    "make","ndk","packages","pdk","prebuilts","sdk",
    "system","tools", "vendor"
];

const GITHUB_TOKEN = "";

let allRepos = [];
let repoMap = new Map();

let currentRepoName = "";
let currentInnerPath = "";
let currentFilePath = "";

let sortMode = "name";
let latestCommitCache = new Map();
let itemCommitCache = new Map();

let menuOpen = false;
let sortMenuOpen = false;

function headers() {
    const h = { "Accept": "application/vnd.github+json" };
    if (GITHUB_TOKEN) h["Authorization"] = "Bearer " + GITHUB_TOKEN;
    return h;
}

function escapeHtml(str) {
    return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
}

function virtualRepoPath(repoName) {
    return repoName.split("_").join("/");
}

function repoMatchesRootFilter(name) {
    return allowedPrefixes.some(prefix => name === prefix || name.startsWith(prefix + "_"));
}

function shortSha(sha) {
    return sha ? sha.slice(0, 7) : "";
}

function fmtDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    if (Number.isNaN(d.getTime())) return "";
    return d.toISOString().replace("T", " ").split(".")[0];
}

function pluralize(value, unit) {
    return `${value} ${unit}${value === 1 ? "" : "s"}`;
}

function humanizeAgo(dateStr) {
    if (!dateStr) return "";
    const date = new Date(dateStr);
    const diff = Date.now() - date.getTime();
    if (!Number.isFinite(diff) || diff < 0) return "";

    const minute = 60 * 1000;
    const hour = 60 * minute;
    const day = 24 * hour;
    const month = 30 * day;
    const year = 365 * day;

    if (diff < minute) return "just now";
    if (diff < hour) return `${pluralize(Math.floor(diff / minute), "minute")} ago`;
    if (diff < day) return `${pluralize(Math.floor(diff / hour), "hour")} ago`;
    if (diff < month) return `${pluralize(Math.floor(diff / day), "day")} ago`;
    if (diff < year) return `${pluralize(Math.floor(diff / month), "month")} ago`;
    return `${pluralize(Math.floor(diff / year), "year")} ago`;
}

function decodeBase64Utf8(str) {
    const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
    return new TextDecoder("utf-8").decode(bytes);
}

function escapeAndPreserveSpaces(str) {
    return escapeHtml(str).replaceAll(" ", "&nbsp;");
}

function tokenSpan(cls, value) {
    return `<span class="${cls}">${value}</span>`;
}

function classifyLanguage(fileName, fileData) {
    const lower = (fileName || "").toLowerCase();
    if (lower.endsWith(".xml") || lower.endsWith(".xsd") || lower.endsWith(".xsl") || lower.endsWith(".html") || lower.endsWith(".htm")) return "xml";
    if (lower.endsWith(".java")) return "java";
    if (lower.endsWith(".c") || lower.endsWith(".h") || lower.endsWith(".cc") || lower.endsWith(".cpp") || lower.endsWith(".cxx") || lower.endsWith(".hpp") || lower.endsWith(".hh")) return "cpp";
    const mime = (fileData && (fileData.type || fileData.mime_type || "")).toLowerCase();
    if (mime.includes("xml")) return "xml";
    if (mime.includes("java")) return "java";
    if (mime.includes("c++") || mime.includes("cpp") || mime.includes("c-source") || mime.includes("c-header")) return "cpp";
    return "";
}

function highlightXml(code) {
    const lines = code.split(/\r?\n/);
    return lines.map(line => {
        let out = "";
        let i = 0;
        while (i < line.length) {
            const rest = line.slice(i);
            if (rest.startsWith("<!--")) {
                out += tokenSpan("tok-comment", escapeAndPreserveSpaces(rest));
                break;
            }
            if (rest.startsWith("<![CDATA[")) {
                const end = rest.indexOf("]]>");
                const chunk = end >= 0 ? rest.slice(0, end + 3) : rest;
                out += tokenSpan("tok-string", escapeAndPreserveSpaces(chunk));
                i += chunk.length;
                continue;
            }
            if (rest[0] === "<") {
                const end = rest.indexOf(">");
                const chunk = end >= 0 ? rest.slice(0, end + 1) : rest;
                const escaped = escapeHtml(chunk)
                    .replace(/(&lt;\/?)([A-Za-z_][\w:.-]*)/g, '$1<span class="tok-tag">$2</span>')
                    .replace(/([A-Za-z_:][\w:.-]*)(=)/g, '<span class="tok-attr">$1</span>$2')
                    .replace(/(&quot;.*?&quot;|'.*?')/g, '<span class="tok-string">$1</span>');
                out += escaped;
                i += chunk.length;
                continue;
            }
            const next = rest.indexOf("<");
            const chunk = next >= 0 ? rest.slice(0, next) : rest;
            out += escapeHtml(chunk);
            i += chunk.length;
        }
        return out;
    }).join("\n");
}

function highlightJavaLike(code) {
    const keywords = new Set([
        "abstract","assert","boolean","break","byte","case","catch","char","class","const","continue","default","do","double","else","enum","extends","final","finally","float","for","goto","if","implements","import","instanceof","int","interface","long","native","new","package","private","protected","public","return","short","static","strictfp","super","switch","synchronized","this","throw","throws","transient","try","void","volatile","while","var","record","sealed","non-sealed","permits"
    ]);
    const types = new Set(["String","Integer","Long","Double","Float","Boolean","Character","Object","List","Map","Set","HashMap","ArrayList","System","Thread","Exception","Throwable","Runnable","StringBuilder","StringBuffer"]);
    const lines = code.split(/\r?\n/);
    return lines.map(line => {
        let out = "";
        let i = 0;
        let inBlockComment = false;
        while (i < line.length) {
            const rest = line.slice(i);
            if (inBlockComment) {
                const end = rest.indexOf("*/");
                if (end >= 0) {
                    out += tokenSpan("tok-comment", escapeHtml(rest.slice(0, end + 2)));
                    i += end + 2;
                    inBlockComment = false;
                } else {
                    out += tokenSpan("tok-comment", escapeHtml(rest));
                    break;
                }
                continue;
            }
            if (rest.startsWith("/*")) {
                const end = rest.indexOf("*/", 2);
                if (end >= 0) {
                    out += tokenSpan("tok-comment", escapeHtml(rest.slice(0, end + 2)));
                    i += end + 2;
                } else {
                    out += tokenSpan("tok-comment", escapeHtml(rest));
                    inBlockComment = true;
                    break;
                }
                continue;
            }
            if (rest.startsWith("//")) {
                out += tokenSpan("tok-comment", escapeHtml(rest));
                break;
            }
            const ch = rest[0];
            if (ch === '"' || ch === "'") {
                let j = 1;
                while (j < rest.length) {
                    if (rest[j] === "\\" && j + 1 < rest.length) {
                        j += 2;
                        continue;
                    }
                    if (rest[j] === ch) {
                        j++;
                        break;
                    }
                    j++;
                }
                out += tokenSpan("tok-string", escapeHtml(rest.slice(0, j)));
                i += j;
                continue;
            }
            const numMatch = rest.match(/^(0x[0-9a-fA-F]+|\d+\.\d+|\d+[uUlLfF]?)/);
            if (numMatch) {
                out += tokenSpan("tok-number", escapeHtml(numMatch[0]));
                i += numMatch[0].length;
                continue;
            }
            const idMatch = rest.match(/^[_$A-Za-z][_$A-Za-z0-9]*/);
            if (idMatch) {
                const word = idMatch[0];
                if (keywords.has(word)) out += tokenSpan("tok-keyword", escapeHtml(word));
                else if (types.has(word) || /^[A-Z][A-Za-z0-9_]*$/.test(word)) out += tokenSpan("tok-type", escapeHtml(word));
                else out += escapeHtml(word);
                i += word.length;
                continue;
            }
            out += tokenSpan("tok-punct", escapeHtml(ch));
            i += 1;
        }
        return out;
    }).join("\n");
}

function highlightCode(code, language) {
    const safe = String(code).replace(/\u0000/g, "");
    if (language === "xml") return highlightXml(safe);
    if (language === "java" || language === "cpp") return highlightJavaLike(safe);
    return escapeHtml(safe);
}

function setActivePanel(which) {
    const panels = ["rootView", "repoView", "fileView", "notFoundView"];
    for (const id of panels) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle("active", id === `${which}View`);
    }

    const showMenu = which === "repo" || which === "file";
    const menuBtn = document.getElementById("menuButton");
    if (menuBtn) menuBtn.classList.toggle("active", showMenu);

    if (!showMenu) closeMenu();
}

function decodePathPart(p) {
    return decodeURIComponent(p || "");
}

function encodePathPart(p) {
    return encodeURIComponent(p).replaceAll("%2F", "/");
}

async function fetchJson(url) {
    const res = await fetch(url, { headers: headers() });
    if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(`${res.status} ${res.statusText}${text ? " — " + text.slice(0, 180) : ""}`);
    }
    return res.json();
}

async function fetchText(url) {
    const res = await fetch(url, { headers: headers() });
    if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(`${res.status} ${res.statusText}${text ? " — " + text.slice(0, 180) : ""}`);
    }
    return res.text();
}

async function loadAllRepos() {
    const collected = [];
    for (let page = 1; page <= 10; page++) {
        const url = `https://api.github.com/users/${OWNER}/repos?per_page=100&page=${page}&sort=updated`;
        const batch = await fetchJson(url);
        if (!Array.isArray(batch) || batch.length === 0) break;
        collected.push(...batch);
        if (batch.length < 100) break;
    }

    allRepos = collected.filter(r => repoMatchesRootFilter(r.name));
    allRepos.sort((a, b) => virtualRepoPath(a.name).localeCompare(virtualRepoPath(b.name)));
    repoMap = new Map(allRepos.map(r => [r.name, r]));
}

function findRepoByName(name) {
    return repoMap.get(name) || null;
}

function cacheKey(repoName, path) {
    return `${repoName}::${path || ""}`;
}

async function getLatestCommitForPath(repo, path = "") {
    const key = cacheKey(repo.name, path);
    if (latestCommitCache.has(key)) return latestCommitCache.get(key);

    const promise = (async () => {
        try {
            const suffix = path ? `&path=${encodeURIComponent(path)}` : "";
            const url = `https://api.github.com/repos/${OWNER}/${repo.name}/commits?per_page=1${suffix}`;
            const commits = await fetchJson(url);
            if (Array.isArray(commits) && commits.length > 0) return commits[0];
        } catch (_) {}
        return null;
    })();

    latestCommitCache.set(key, promise);
    return promise;
}

async function getLatestRootCommit() {
    const key = "__root_latest__";
    if (latestCommitCache.has(key)) return latestCommitCache.get(key);

    const promise = (async () => {
        if (!allRepos.length) return null;
        const repo = [...allRepos].sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];
        if (!repo) return null;
        const commit = await getLatestCommitForPath(repo, "");
        return commit ? { repo, commit } : null;
    })();

    latestCommitCache.set(key, promise);
    return promise;
}

async function getItemCommitDate(repo, path) {
    const key = cacheKey(repo.name, path);
    if (itemCommitCache.has(key)) return itemCommitCache.get(key);

    const promise = (async () => {
        try {
            const url = `https://api.github.com/repos/${OWNER}/${repo.name}/commits?per_page=1&path=${encodeURIComponent(path)}`;
            const commits = await fetchJson(url);
            if (Array.isArray(commits) && commits.length > 0) {
                const c = commits[0];
                return c?.commit?.committer?.date || c?.commit?.author?.date || "";
            }
        } catch (_) {}
        return "";
    })();

    itemCommitCache.set(key, promise);
    return promise;
}

function getRepoDownloadUrl(repo) {
    return repo.zipball_url || `https://github.com/${OWNER}/${repo.name}/archive/refs/heads/${repo.default_branch || "main"}.zip`;
}

function renderNotFound(message = "Repo not found! Try again..") {
    document.getElementById("notFoundText").textContent = message;
    setActivePanel("notFound");
}

function openMenu() {
    menuOpen = true;
    const panel = document.getElementById("menuPanel");
    if (panel) panel.classList.add("open");
    updateMenuTexts();
}

function closeMenu() {
    menuOpen = false;
    const panel = document.getElementById("menuPanel");
    if (panel) panel.classList.remove("open");
    closeSortMenu();
}

function toggleMenu() {
    if (menuOpen) closeMenu();
    else openMenu();
}

function openSortMenu() {
    sortMenuOpen = true;
    const el = document.getElementById("sortSubmenu");
    if (el) el.classList.add("open");
    updateSortButtons();
}

function closeSortMenu() {
    sortMenuOpen = false;
    const el = document.getElementById("sortSubmenu");
    if (el) el.classList.remove("open");
}

function toggleSortMenu() {
    if (sortMenuOpen) closeSortMenu();
    else openSortMenu();
}

function updateMenuTexts() {
    const sortToggle = document.getElementById("menuSortToggle");
    const downloadBtn = document.getElementById("menuDownload");

    if (sortToggle) sortToggle.textContent = `Sort by… (${sortMode})`;
    if (downloadBtn) downloadBtn.textContent = "Download this repo…";

    updateSortButtons();
}

function updateSortButtons() {
    document.querySelectorAll("#sortSubmenu button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.sort === sortMode);
    });
}

function setSortMode(mode) {
    sortMode = mode;
    updateMenuTexts();
    if (currentRepoName) {
        if (currentFilePath) {
            renderFile(currentRepoName, currentFilePath);
        } else {
            renderRepo(currentRepoName, currentInnerPath);
        }
    }
}

function downloadCurrentRepo() {
    const repo = findRepoByName(currentRepoName);
    if (!repo) return;
    window.location.href = getRepoDownloadUrl(repo);
}

function renderRootCommitStrip(commitData) {
    const el = document.getElementById("rootCommitStrip");
    if (!el) return;

    if (!commitData || !commitData.commit) {
        el.classList.remove("active");
        el.innerHTML = "";
        return;
    }

    const commit = commitData.commit;
    const repo = commitData.repo;
    const committerName =
        commit?.commit?.committer?.name ||
        commit?.commit?.author?.name ||
        commit?.committer?.login ||
        "Unknown";

    const message = commit?.commit?.message ? commit.commit.message.split("\n")[0] : "";
    const when = commit?.commit?.committer?.date || commit?.commit?.author?.date || "";
    const repoPath = virtualRepoPath(repo.name);

    el.innerHTML = `
        <div class="label">Latest commit in /ZenithOS/</div>
        <div class="row">
            <div><span class="piece">repo:</span> ${escapeHtml(repoPath)}</div>
            <div><span class="piece">committer:</span> ${escapeHtml(committerName)}</div>
            <div><span class="piece">message:</span> ${escapeHtml(message || "—")}</div>
            <div><span class="piece">date:</span> ${escapeHtml(humanizeAgo(when))}</div>
        </div>
    `;
    el.classList.add("active");
}

async function enrichItemsForDateSort(repo, items, basePath) {
    if (sortMode !== "date") return items;

    await Promise.all(items.map(async item => {
        const fullPath = basePath ? `${basePath}/${item.name}` : item.name;
        item._sortDate = await getItemCommitDate(repo, fullPath);
    }));

    return items;
}

function compareItems(a, b) {
    if (sortMode === "size") {
        const sizeA = a.type === "dir" ? -1 : (a.size || 0);
        const sizeB = b.type === "dir" ? -1 : (b.size || 0);
        if (sizeA !== sizeB) return sizeB - sizeA;
        return a.name.localeCompare(b.name);
    }

    if (sortMode === "date") {
        const dateA = a._sortDate ? new Date(a._sortDate).getTime() : 0;
        const dateB = b._sortDate ? new Date(b._sortDate).getTime() : 0;
        if (dateA !== dateB) return dateB - dateA;
        return a.name.localeCompare(b.name);
    }

    return a.name.localeCompare(b.name);
}

function itemRightLabel(item) {
    if (item.type === "dir") return "dir";

    if (sortMode === "date" && item._sortDate) {
        return fmtDate(item._sortDate) || "file";
    }

    if (item.size != null) return `${item.size} B`;
    return "file";
}

async function renderRoot() {
    setActivePanel("root");

    const table = document.getElementById("repoTable");
    const sub = document.getElementById("rootSub");
    const title = document.getElementById("rootTitle");

    if (!table || !sub || !title) return;

    title.textContent = "Index of /ZenithOS/";
    sub.textContent = `Showing ${allRepos.length} filtered repos`;
    table.innerHTML = "";

    const rootCommitStrip = document.getElementById("rootCommitStrip");
    if (rootCommitStrip) {
        rootCommitStrip.classList.add("active");
        rootCommitStrip.innerHTML = `<div class="label">Latest commit in /ZenithOS/</div><div class="row"><div class="piece">Loading…</div></div>`;
    }

    allRepos.forEach(repo => {
        const tr = document.createElement("tr");

        const nameTd = document.createElement("td");
        const dateTd = document.createElement("td");

        nameTd.className = "name";
        dateTd.className = "date";

        const path = virtualRepoPath(repo.name);

        const a = document.createElement("a");
        a.href = "#/repo/" + encodePathPart(repo.name);
        a.textContent = path;

        nameTd.appendChild(a);
        dateTd.textContent = fmtDate(repo.updated_at);

        tr.appendChild(nameTd);
        tr.appendChild(dateTd);

        tr.onclick = () => location.hash = "#/repo/" + encodePathPart(repo.name);

        table.appendChild(tr);
    });

    try {
        const commitData = await getLatestRootCommit();
        renderRootCommitStrip(commitData);
    } catch (_) {
        if (rootCommitStrip) {
            rootCommitStrip.classList.remove("active");
            rootCommitStrip.innerHTML = "";
        }
    }
}

async function renderRepo(repoName, innerPath = "") {
    const repo = findRepoByName(repoName);
    if (!repo) {
        renderNotFound();
        return;
    }

    currentRepoName = repoName;
    currentInnerPath = innerPath;
    currentFilePath = "";

    setActivePanel("repo");
    updateMenuTexts();

    const title = document.getElementById("repoTitle");
    const crumbs = document.getElementById("repoCrumbs");
    const hint = document.getElementById("repoHint");
    const table = document.getElementById("contentTable");

    if (!title || !crumbs || !hint || !table) return;

    const basePath = virtualRepoPath(repo.name);
    const fullPath = innerPath ? `${basePath}/${innerPath}` : basePath;

    title.textContent = `Index of /ZenithOS/${fullPath}/`;
    hint.textContent = sortMode === "name"
        ? "sorted by name"
        : sortMode === "size"
            ? "sorted by size"
            : "sorted by date";

    crumbs.innerHTML = "";
    const home = document.createElement("a");
    home.textContent = "ZenithOS";
    home.onclick = () => location.hash = "#/";
    crumbs.appendChild(home);

    const parts = basePath.split("/").filter(Boolean);
    for (const part of parts) {
        const sep = document.createElement("span");
        sep.textContent = " / ";
        crumbs.appendChild(sep);

        const link = document.createElement("a");
        link.textContent = part;
        link.onclick = () => location.hash = "#/repo/" + encodePathPart(repo.name);
        crumbs.appendChild(link);
    }

    if (innerPath) {
        const extra = innerPath.split("/").filter(Boolean);
        let cur = "";
        for (const part of extra) {
            cur += (cur ? "/" : "") + part;
            const sep = document.createElement("span");
            sep.textContent = " / ";
            crumbs.appendChild(sep);

            const link = document.createElement("a");
            link.textContent = part;
            link.onclick = () => location.hash = "#/repo/" + encodePathPart(repo.name) + "/" + encodePathPart(cur);
            crumbs.appendChild(link);
        }
    }

    table.innerHTML = `<tr><td class="loading">Loading…</td><td></td></tr>`;

    try {
        const apiPath = innerPath ? `/${innerPath.split("/").map(encodeURIComponent).join("/")}` : "";
        const url = `https://api.github.com/repos/${OWNER}/${repo.name}/contents${apiPath}`;
        const data = await fetchJson(url);

        if (!Array.isArray(data) && data && data.type && data.type !== "dir") {
            location.hash = `#/file/${encodePathPart(repo.name)}/${encodePathPart(innerPath)}`;
            return;
        }

        let items = Array.isArray(data) ? data : [data];
        items = items.filter(Boolean);

        if (sortMode === "date") {
            await enrichItemsForDateSort(repo, items, innerPath);
        }

        items.sort(compareItems);

        table.innerHTML = "";

        if (items.length === 0) {
            table.innerHTML = `<tr><td class="small">Empty.</td><td></td></tr>`;
        } else {
            items.forEach(item => {
                const tr = document.createElement("tr");
                const nameTd = document.createElement("td");
                const dateTd = document.createElement("td");

                nameTd.className = "name";
                dateTd.className = "date";

                const a = document.createElement("a");
                const nextPath = innerPath ? `${innerPath}/${item.name}` : item.name;

                if (item.type === "dir") {
                    a.href = "#/repo/" + encodePathPart(repo.name) + "/" + encodePathPart(nextPath);
                    a.textContent = item.name + "/";
                    tr.onclick = () => location.hash = "#/repo/" + encodePathPart(repo.name) + "/" + encodePathPart(nextPath);
                } else {
                    a.href = "#/file/" + encodePathPart(repo.name) + "/" + encodePathPart(nextPath);
                    a.textContent = item.name;
                    tr.onclick = () => location.hash = "#/file/" + encodePathPart(repo.name) + "/" + encodePathPart(nextPath);
                }

                nameTd.appendChild(a);
                dateTd.textContent = itemRightLabel(item);

                tr.appendChild(nameTd);
                tr.appendChild(dateTd);
                table.appendChild(tr);
            });
        }

    } catch (e) {
        table.innerHTML = `<tr><td class="error">Error: ${escapeHtml(e.message)}</td><td></td></tr>`;
    }
}

async function renderFile(repoName, filePath) {
    const repo = findRepoByName(repoName);
    if (!repo) {
        renderNotFound();
        return;
    }

    currentRepoName = repoName;
    currentInnerPath = "";
    currentFilePath = filePath;

    setActivePanel("file");
    updateMenuTexts();

    const basePath = virtualRepoPath(repo.name);
    const displayPath = `${basePath}/${filePath}`;

    const fileTitle = document.getElementById("fileTitle");
    const fileBack = document.getElementById("fileBack");
    const fileHint = document.getElementById("fileHint");
    const fileMeta = document.getElementById("fileMeta");
    const fileContent = document.getElementById("fileContent");

    if (!fileTitle || !fileBack || !fileHint || !fileMeta || !fileContent) return;

    fileTitle.textContent = `Index of /ZenithOS/${displayPath}`;
    fileBack.onclick = () => {
        const parent = filePath.split("/").slice(0, -1).join("/");
        location.hash = parent
            ? `#/repo/${encodePathPart(repo.name)}/${encodePathPart(parent)}`
            : `#/repo/${encodePathPart(repo.name)}`;
    };

    fileHint.textContent = "file viewer";
    fileMeta.innerHTML = "";
    fileContent.textContent = "Loading…";
    try {
        const apiUrl = `https://api.github.com/repos/${OWNER}/${repo.name}/contents/${filePath.split("/").map(encodeURIComponent).join("/")}`;
        const fileData = await fetchJson(apiUrl);

        let text = "";

        if (fileData && fileData.encoding === "base64" && typeof fileData.content === "string") {
            text = decodeBase64Utf8(fileData.content.replace(/\n/g, ""));
        } else if (fileData && fileData.download_url) {
            text = await fetchText(fileData.download_url);
        } else {
            text = "[binary or unavailable file]";
        }

        const language = classifyLanguage(fileData?.name || filePath, fileData);

        let commit = null;
        try {
            const commitsUrl = `https://api.github.com/repos/${OWNER}/${repo.name}/commits?path=${encodeURIComponent(filePath)}&per_page=1`;
            const commits = await fetchJson(commitsUrl);
            if (Array.isArray(commits) && commits.length > 0) commit = commits[0];
        } catch (_) {}

        const meta = [];
        meta.push(`<div><span class="small">path:</span> <span class="path">${escapeHtml(displayPath)}</span></div>`);
        meta.push(`<div><span class="small">repo sha:</span> ${escapeHtml(shortSha(fileData.sha || ""))}</div>`);

        if (commit) {
            meta.push(`<div><span class="small">commit:</span> ${escapeHtml(shortSha(commit.sha || ""))}</div>`);
            const msg = commit.commit && commit.commit.message ? commit.commit.message.split("\n")[0] : "";
            if (msg) meta.push(`<div><span class="small">message:</span> ${escapeHtml(msg)}</div>`);
            const date = commit.commit && commit.commit.committer && commit.commit.committer.date ? fmtDate(commit.commit.committer.date) : "";
            if (date) meta.push(`<div><span class="small">date:</span> ${escapeHtml(date)}</div>`);
        }

        fileMeta.innerHTML = meta.join("");
        fileContent.innerHTML = highlightCode(text, language);

    } catch (e) {
        fileContent.textContent = `Error: ${e.message}`;
    }
}

async function route() {
    const hash = location.hash.replace(/^#/, "");
    const parts = hash.split("/").filter(Boolean);

    if (parts.length === 0) {
        await renderRoot();
        return;
    }

    if (parts[0] === "repo") {
        const repoName = decodePathPart(parts[1] || "");
        const innerPath = parts.slice(2).map(decodePathPart).join("/");
        await renderRepo(repoName, innerPath);
        return;
    }

    if (parts[0] === "file") {
        const repoName = decodePathPart(parts[1] || "");
        const filePath = parts.slice(2).map(decodePathPart).join("/");
        await renderFile(repoName, filePath);
        return;
    }

    await renderRoot();
}

window.addEventListener("hashchange", route);

document.getElementById("menuButton").addEventListener("click", (e) => {
    e.stopPropagation();
    toggleMenu();
});

document.getElementById("menuSortToggle").addEventListener("click", (e) => {
    e.stopPropagation();
    toggleSortMenu();
});

document.getElementById("menuDownload").addEventListener("click", (e) => {
    e.stopPropagation();
    downloadCurrentRepo();
});

document.querySelectorAll("#sortSubmenu button").forEach(btn => {
    btn.addEventListener("click", (e) => {
        e.stopPropagation();
        setSortMode(btn.dataset.sort || "name");
    });
});

document.addEventListener("click", (e) => {
    const menuPanel = document.getElementById("menuPanel");
    const menuButton = document.getElementById("menuButton");
    if (!menuPanel || !menuButton) return;

    const clickedInside = menuPanel.contains(e.target) || menuButton.contains(e.target);
    if (!clickedInside) closeMenu();
});

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeMenu();
});

(async function init() {
    try {
        await loadAllRepos();
        updateMenuTexts();
        await route();
    } catch (e) {
        renderNotFound("Repo not found! Try again..");
    }
})();
</script>
